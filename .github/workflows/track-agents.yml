name: Track Agents

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: track-agents
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update clankers.md and clankers.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const username = context.payload.pull_request.user.login;
            const now = new Date().toISOString();
            const mdFile = 'clankers.md';
            const jsonFile = 'clankers.json';

            execSync('git pull --rebase origin main', { stdio: 'inherit' });

            // load existing data from JSON if exists, otherwise parse MD
            let rows = [];

            if (fs.existsSync(jsonFile)) {
              rows = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
            } else {
              // bootstrap from MD
              const content = fs.readFileSync(mdFile, 'utf8');
              for (const line of content.split('\n')) {
                const match = line.match(/^\|\s*(.+?)\s*\|\s*(\d+)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|$/);
                if (match && match[1] !== 'Username') {
                  rows.push({
                    username: match[1].trim(),
                    total_prs: parseInt(match[2]),
                    first_pr: match[3].trim(),
                    last_pr: match[4] ? match[4].trim() : match[3].trim()
                  });
                }
              }

              // fallback: old 3-column MD format
              if (rows.length === 0) {
                const content2 = fs.readFileSync(mdFile, 'utf8');
                for (const line of content2.split('\n')) {
                  const match = line.match(/^\|\s*(.+?)\s*\|\s*(\d+)\s*\|\s*([\d-]+)\s*\|$/);
                  if (match && match[1] !== 'Username') {
                    rows.push({
                      username: match[1].trim(),
                      total_prs: parseInt(match[2]),
                      first_pr: match[3].trim() + 'T00:00:00.000Z',
                      last_pr: match[3].trim() + 'T00:00:00.000Z'
                    });
                  }
                }
              }
            }

            // update or add
            const existing = rows.find(r => r.username === username);
            if (existing) {
              existing.total_prs += 1;
              existing.last_pr = now;
            } else {
              rows.push({
                username: username,
                total_prs: 1,
                first_pr: now,
                last_pr: now
              });
            }

            // sort by total_prs descending
            rows.sort((a, b) => b.total_prs - a.total_prs);

            // write JSON
            fs.writeFileSync(jsonFile, JSON.stringify(rows, null, 2) + '\n');

            // write MD
            let md = '# Clankers\n\n';
            md += 'Automated tracking of all Clankers PR contributors.\n\n';
            md += '| Username | Total PRs | First PR | Last PR |\n';
            md += '|----------|-----------|----------|----------|\n';
            for (const row of rows) {
              md += `| ${row.username} | ${row.total_prs} | ${row.first_pr} | ${row.last_pr} |\n`;
            }
            fs.writeFileSync(mdFile, md);

            // check if changed
            const diff = execSync('git diff --quiet clankers.md clankers.json || echo changed').toString().trim();
            if (diff !== 'changed') {
              console.log('No changes needed');
              return;
            }

            execSync('git config user.name "clanker-journalist[bot]"');
            execSync('git config user.email "clanker-journalist[bot]@users.noreply.github.com"');
            execSync('git add clankers.md clankers.json');
            execSync(`git commit -m "clankers database: update clanker stats for ${username}"`);
            execSync('git pull --rebase origin main', { stdio: 'inherit' });
            execSync('git push', { stdio: 'inherit' });
            console.log(`Updated ${username}`);
