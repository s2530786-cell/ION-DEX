name: ION DEX verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ion-dex-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Development preflight
        run: node scripts/dev-preflight.mjs

      - name: Encoding check
        shell: pwsh
        run: ./scripts/check-encoding.ps1

      - name: Cache ION toolchain
        uses: actions/cache@v5
        with:
          path: ~/.cache/ion-dex-toolchain
          key: ion-toolchain-${{ runner.os }}-${{ hashFiles('scripts/setup-ion-toolchain.sh') }}

      - name: Setup ION toolchain (func + fift + ION stdlib)
        run: bash scripts/setup-ion-toolchain.sh || true

      - name: Load toolchain env
        run: |
          source ~/.cache/ion-dex-toolchain/.ready
          echo "ION_TOOLCHAIN_ROOT=$ION_TOOLCHAIN_ROOT" >> "$GITHUB_ENV"
          echo "ION_FUNC_EXE=$ION_FUNC_EXE" >> "$GITHUB_ENV"
          echo "ION_STDLIB_FC=$ION_STDLIB_FC" >> "$GITHUB_ENV"
          echo "ION_FIFT_EXE=$ION_TOOLCHAIN_ROOT/bin/fift" >> "$GITHUB_ENV"
          echo "FIFTPATH=$FIFTPATH" >> "$GITHUB_ENV"
          echo "ION_FUNC_FALLBACK=$ION_FUNC_FALLBACK" >> "$GITHUB_ENV"

          echo "$ION_TOOLCHAIN_ROOT/bin" >> "$GITHUB_PATH"

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Build backend (TS 鈫?dist)
        working-directory: backend
        run: npm run build

      - name: Contract verify (FunC 5x + fift dry-run + TS math)
        env:
          CI: "true"
          ION_FUNC_COMPILE_PASSES: "5"
          ION_FUNC_P0_STRICT: "1"
          ION_DEPLOY_DRY_RUN: "1"
          ION_DEPLOY_NETWORK: "testnet"
          ION_SKIP_FUNC: "true"
        run: node scripts/verify-contracts.mjs

      - name: Backend verify (build + API tests)
        working-directory: backend
        run: npm run verify

      - name: Backend audit (high)
        working-directory: backend
        run: npm run audit:high

      - name: Backend stress smoke
        working-directory: backend
        run: npm run stress

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend verify (build + Playwright)
        working-directory: frontend
        run: npm run verify

      - name: npm audit (high)
        working-directory: frontend
        run: npm run audit:high
