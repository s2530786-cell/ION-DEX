name: Enforce Single Issue Per PR

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for multiple issue references
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '') + ' ' + (pr.title || '');

            // match #123, GH-123, owner/repo#123, and full issue URLs
            const pattern = /(?:(?:[\w.-]+\/[\w.-]+)?#(\d+))|(?:GH-(\d+))|(?:github\.com\/[\w.-]+\/[\w.-]+\/issues\/(\d+))/gi;
            const matches = [...body.matchAll(pattern)];

            // dedupe issue numbers
            const issues = [...new Set(matches.map(m => m[1] || m[2] || m[3]))];

            console.log(`Found ${issues.length} issue reference(s): ${issues.join(', ')}`);

            if (issues.length > 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `⚠️ **This PR references multiple issues (#${issues.join(', #')}).** Each pull request must address exactly one issue. Please split your changes into separate PRs — one per issue.`
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed'
              });

              console.log(`Closed PR #${pr.number} — multiple issues referenced`);
            }
