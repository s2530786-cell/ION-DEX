<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #070b1a;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .clip {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      /* —— Background layer —— */
      .bg-layer {
        background: radial-gradient(1200px 800px at 18% 22%, #1a0f3d 0%, transparent 55%),
          radial-gradient(900px 700px at 82% 78%, #0c3d5c 0%, transparent 50%),
          linear-gradient(145deg, #070b1a 0%, #12082a 45%, #0a1028 100%);
      }
      .bg-layer::before {
        content: "";
        position: absolute;
        inset: -20%;
        background: repeating-linear-gradient(
            90deg,
            rgba(34, 211, 238, 0.04) 0 1px,
            transparent 1px 120px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(167, 139, 250, 0.03) 0 1px,
            transparent 1px 120px
          );
        transform: rotate(-8deg);
      }
      .aurora {
        position: absolute;
        width: 1400px;
        height: 600px;
        left: 10%;
        top: 8%;
        background: radial-gradient(
          ellipse at center,
          rgba(34, 211, 238, 0.22) 0%,
          rgba(232, 121, 249, 0.12) 40%,
          transparent 70%
        );
        filter: blur(40px);
      }
      .aurora-b {
        left: auto;
        right: -5%;
        top: auto;
        bottom: 5%;
        background: radial-gradient(
          ellipse at center,
          rgba(167, 139, 250, 0.2) 0%,
          rgba(251, 191, 36, 0.08) 45%,
          transparent 70%
        );
      }
      .stars {
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background-image: radial-gradient(1px 1px at 10% 20%, #fff, transparent),
          radial-gradient(1px 1px at 30% 80%, rgba(255, 255, 255, 0.8), transparent),
          radial-gradient(1.5px 1.5px at 70% 15%, #fff, transparent),
          radial-gradient(1px 1px at 85% 60%, rgba(34, 211, 238, 0.9), transparent),
          radial-gradient(1px 1px at 55% 45%, #fff, transparent),
          radial-gradient(1px 1px at 92% 88%, rgba(232, 121, 249, 0.8), transparent);
      }

      /* —— Scene content —— */
      .scene-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 100px 140px;
        gap: 28px;
        position: relative;
        z-index: 2;
      }
      .meta-row {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(34, 211, 238, 0.85);
      }
      .meta-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #22d3ee;
        box-shadow: 0 0 20px #22d3ee;
      }
      .hero-logo-wrap {
        display: flex;
        align-items: center;
        gap: 48px;
      }
      .hero-logo {
        width: 160px;
        height: 160px;
        border-radius: 36px;
        object-fit: cover;
        border: 3px solid rgba(34, 211, 238, 0.55);
        box-shadow: 0 0 60px rgba(34, 211, 238, 0.35), 0 0 120px rgba(167, 139, 250, 0.2);
      }
      .title-block h1 {
        font-size: 108px;
        font-weight: 800;
        line-height: 1.02;
        letter-spacing: -0.03em;
        background: linear-gradient(120deg, #f8fafc 0%, #a5f3fc 35%, #c4b5fd 70%, #f0abfc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .title-block p {
        margin-top: 16px;
        font-size: 38px;
        font-weight: 500;
        color: rgba(226, 232, 240, 0.88);
        max-width: 900px;
      }
      .glass-panel {
        margin-top: 24px;
        padding: 36px 48px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.45);
        border: 2px solid rgba(34, 211, 238, 0.35);
        box-shadow: 0 0 40px rgba(34, 211, 238, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        max-width: 1100px;
      }
      .features {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
      }
      .feature-pill {
        font-size: 32px;
        font-weight: 700;
        padding: 18px 36px;
        border-radius: 999px;
        color: #f1f5f9;
        border: 2px solid rgba(167, 139, 250, 0.5);
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.12), rgba(232, 121, 249, 0.1));
        box-shadow: 0 0 24px rgba(167, 139, 250, 0.25);
      }
      .feature-pill span {
        color: #22d3ee;
        margin-right: 10px;
      }
      .cta-line {
        font-size: 52px;
        font-weight: 800;
        letter-spacing: 0.06em;
        color: #f8fafc;
        text-shadow: 0 0 40px rgba(34, 211, 238, 0.5);
      }
      .cta-sub {
        font-size: 28px;
        color: rgba(167, 139, 250, 0.95);
        margin-top: 12px;
      }
      .neon-bar {
        position: absolute;
        bottom: 80px;
        left: 140px;
        right: 140px;
        height: 4px;
        background: linear-gradient(90deg, transparent, #22d3ee, #e879f9, #fbbf24, transparent);
        transform-origin: left center;
        opacity: 0.9;
      }
      .corner-tag {
        position: absolute;
        right: 140px;
        bottom: 120px;
        font-size: 20px;
        letter-spacing: 0.2em;
        color: rgba(148, 163, 184, 0.7);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ion-dex-intro"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="bg"
        class="clip bg-layer"
        data-start="0"
        data-duration="10"
        data-track-index="0"
        data-layout-allow-overflow
      >
        <div class="aurora"></div>
        <div class="aurora aurora-b"></div>
        <div class="stars"></div>
      </div>

      <div
        id="scene-open"
        class="clip"
        data-start="0"
        data-duration="3.4"
        data-track-index="1"
      >
        <div class="scene-content">
          <div class="meta-row">
            <span class="meta-dot"></span>
            <span>ION Chain · Web3 DEX</span>
          </div>
          <div class="hero-logo-wrap">
            <img class="hero-logo" src="assets/ion-logo.jpg" alt="ION" />
            <div class="title-block">
              <h1>ION DEX</h1>
              <p>下一代 ION 生态交易枢纽 — 极速兑换 · 专业现货 · 链上透明</p>
            </div>
          </div>
        </div>
        <div class="neon-bar"></div>
      </div>

      <div
        id="scene-features"
        class="clip"
        data-start="3.4"
        data-duration="4"
        data-track-index="1"
      >
        <div class="scene-content" style="justify-content: flex-end; padding-bottom: 160px">
          <div class="glass-panel">
            <div class="features">
              <div class="feature-pill"><span>◆</span>Swap</div>
              <div class="feature-pill"><span>◆</span>Staking</div>
              <div class="feature-pill"><span>◆</span>Bridge</div>
              <div class="feature-pill"><span>◆</span>Burn Analytics</div>
            </div>
          </div>
        </div>
      </div>

      <div
        id="scene-close"
        class="clip"
        data-start="7.4"
        data-duration="2.6"
        data-track-index="1"
      >
        <div class="scene-content" style="align-items: center; text-align: center">
          <p class="cta-line">Trade the Future on ION</p>
          <p class="cta-sub">ion-dex · 安全 · 低延迟 · 多链</p>
        </div>
        <span class="corner-tag">10s intro</span>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Ambient background motion
      tl.fromTo(
        "#bg .aurora",
        { x: -40, opacity: 0.6 },
        { x: 30, opacity: 1, duration: 10, ease: "sine.inOut" },
        0
      );
      tl.fromTo(
        "#bg .aurora-b",
        { x: 40, opacity: 0.5 },
        { x: -20, opacity: 0.95, duration: 10, ease: "sine.inOut" },
        0
      );

      // Scene 1 — open
      tl.from("#scene-open .meta-row", { y: 24, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.2);
      tl.from(
        "#scene-open .hero-logo",
        { scale: 0.75, opacity: 0, rotation: -8, duration: 0.7, ease: "back.out(1.4)" },
        0.35
      );
      tl.from("#scene-open h1", { y: 50, opacity: 0, duration: 0.65, ease: "power3.out" }, 0.5);
      tl.from("#scene-open .title-block p", { y: 36, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.75);
      tl.from("#scene-open .neon-bar", { scaleX: 0, duration: 0.8, ease: "power2.inOut" }, 0.9);
      tl.to("#scene-open", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.9);

      // Scene 2 — features
      tl.from("#scene-features", { opacity: 0, duration: 0.35, ease: "power1.out" }, 3.35);
      tl.from(
        "#scene-features .feature-pill",
        { y: 40, opacity: 0, stagger: 0.12, duration: 0.5, ease: "power3.out" },
        3.55
      );
      tl.to("#scene-features", { opacity: 0, duration: 0.4, ease: "power2.in" }, 7.0);
      tl.set("#scene-features", { opacity: 0 }, 7.4);
      tl.set("#scene-open", { opacity: 0 }, 3.4);

      // Scene 3 — close
      tl.from("#scene-close", { opacity: 0, duration: 0.3 }, 7.35);
      tl.from("#scene-close .cta-line", { scale: 0.92, y: 30, opacity: 0, duration: 0.55, ease: "power3.out" }, 7.5);
      tl.from("#scene-close .cta-sub", { y: 20, opacity: 0, duration: 0.45, ease: "power3.out" }, 7.7);
      tl.to("#scene-close", { opacity: 0, scale: 1.02, duration: 0.5, ease: "power2.in" }, 9.35);

      window.__timelines["ion-dex-intro"] = tl;
    </script>
  </body>
</html>
