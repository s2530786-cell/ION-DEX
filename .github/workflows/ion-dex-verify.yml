name: ION DEX verify

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ion-dex-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Encoding check
        shell: pwsh
        run: ./scripts/check-encoding.ps1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend verify (build + Playwright)
        working-directory: frontend
        run: npm run verify

      - name: npm audit (high)
        working-directory: frontend
        run: npm run audit:high
