services:
  redis:
    image: redis:7-alpine
    container_name: ion-dex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ion-dex-postgres
    environment:
      POSTGRES_USER: iondex
      POSTGRES_PASSWORD: iondex_dev_2026
      POSTGRES_DB: iondex
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iondex"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ion-dex-backend
    environment:
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://iondex:iondex_dev_2026@postgres:5432/iondex?sslmode=disable
      ION_RPC_URL: ${ION_RPC_URL:-https://api.mainnet.ice.io/http/v2/jsonRPC}
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org}
      HOT_WALLET_KEY: ${HOT_WALLET_KEY:-}
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ion-dex-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:
  pg_data:
