# Cursor Automation: ION DEX Autonomous Build Pipeline
# Deploy: copy instructions into https://cursor.com/automations/new (no YAML import API as of 2026-05).
# See .cursor/automations/DEPLOY-GUIDE.md for click-by-click steps (Simplified Chinese).

name: "ION DEX Autonomous Build Pipeline"
description: "24/7 autonomous ION DEX construction — read build order, execute next task, test, commit, repeat"

# UI mapping (set manually in cursor.com/automations):
#   trigger.type      -> Scheduled
#   trigger.schedule  -> */30 * * * *  (UTC)
#   repository        -> s2530786-cell/ION-DEX  (GitHub remote for ion-dex-nuke)
#   branch            -> 2026-05-19-q7fx
#   model             -> Claude Sonnet 4.6 (or Composer-class autonomous model)
#   tools             -> Open pull request, MCP (GitHub + project memory-bank if configured)
#   environment       -> Enabled (uses .cursor/environment.json in repo)

trigger:
  type: schedule
  schedule: "*/30 * * * *"

repository:
  github: "s2530786-cell/ION-DEX"
  branch: "2026-05-19-q7fx"

instructions: |
  You are the ION DEX autonomous build agent. Your mission: execute the architecture build order in `.memory-bank/architecture-audit.md` one task at a time, 24/7, without human intervention.

  ## Step 0: Cloud preflight (Ubuntu — run first every session)
  From repository root:
  1. `export PATH="$HOME/.foundry/bin:$PATH"`
  2. `node scripts/automation-preflight.mjs` — must exit 0
  3. `bash scripts/agent-cloud-verify.sh` — baseline before/after code changes (FunC + backend + frontend + dual-chain when forge present)
  4. Optional local Windows parity: `ION_AUTO_MODE=standard` + `scripts/automation-scheduled-gate.cmd` (see `.memory-bank/development-iron-law-preflight.md` §8)

  If `forge` is missing, run `foundryup` once (Environment install should have done this).

  ## Step 1: Load Build Order
  Read `.memory-bank/architecture-audit.md` section **PHASE NOW (P0)** and pick the **first** line with `- [ ]` (unchecked). Task id is the label after the checkbox (e.g. **P0-1**).

  Also read:
  - `SESSION_STATE.md` — current phase and progress
  - `.cursor/rules/ion-dex-iron-law.mdc`
  - `.cursor/rules/auto-audit.mdc`
  - `.cursor/rules/12-factor-agents.mdc`
  - `.memory-bank/official-repos-index.md`

  ## Step 2: Execute the Task
  Implement the next incomplete P0 task fully:
  - **Search first**: Check official-repos-index before greenfield code
  - **Reuse** production-grade code when available
  - **No garbage**: TypeScript — no `any`, no doubled tags like `motionmotionmotiondiv`
  - **UI**: Prefer react-bits patterns when touching frontend

  ## Step 3: Test and Audit
  After implementation (Linux cloud agent, repo root):
  1. `node scripts/compile-func.mjs` (22/22 green)
  2. `bash scripts/agent-cloud-verify.sh` (full stack verify)
  3. If you changed Solidity under `contracts/bsc/`:
     - `cd contracts/bsc && forge build && forge test --match-contract SecurityAttackTest`
     - 15 categories × 100 iterations = 1500 green minimum; 1 red = fail
  4. Max 3 fix cycles per task

  ## Step 4: Commit and Mark Complete
  If tests pass:
  1. `git add` only changed files (never `.env` or secrets)
  2. `git commit -m "feat(P0-N): [description] — auto-build"`
  3. `git push origin 2026-05-19-q7fx`
  4. Open PR if required; mark task `[x]` in architecture-audit.md
  5. Update `SESSION_STATE.md`

  ## Stop Conditions
  - 3 consecutive failures on same task → mark BLOCKED in SESSION_STATE.md with logs
  - No `- [ ]` left in PHASE NOW (P0) → report "P0 COMPLETE"
  - Never modify `.env` or security-sensitive configs without human approval

  ## Cloud Agent Environment
  - Ubuntu sandbox only. Never use Windows paths (`D:\`, `cmd`, `.cmd` scripts).
  - Use `.cursor/environment.json` install (Foundry + npm + Playwright).
  - MCP memory root: `.memory-bank/` (read files directly if MCP unavailable).

  Rules recap:
  - 铁律 ①: Security first — 1500 green on Solidity changes
  - 铁律 ②: Build → Test → Audit → Fix → Commit
  - 铁律 ③: Self-review before commit
  - 铁律 ⑤: Search official repos before building from scratch
  - 铁律 ⑥: Run commands; do not assume green

mcps:
  - github
  - memory-bank

model: claude-sonnet-4-6
